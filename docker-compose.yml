services:
  api:
    build: .
    container_name: pbl-smarthub-api
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - ./data:/code/data
      - ./app/static/uploads:/code/app/static/uploads
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: unless-stopped
